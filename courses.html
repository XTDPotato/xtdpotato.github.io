<!doctype html>
<html lang="zh-CN" class="mdui-theme-auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" />
    <meta name="renderer" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css" />
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />

    <style>
      html, body { height: 100%; margin: 0; background: var(--mdui-color-surface); color: var(--mdui-color-on-surface); }
      .page { height: 100%; display: flex; flex-direction: column; }
      .content { padding: 12px; box-sizing: border-box; max-width: 1000px; margin: 0 auto; width: 100%; padding-bottom: 48px; }
      
      .top-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
      .search-input { flex-grow: 1; }
      
      .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
        gap: 12px; 
      }
      
      .course-card { height: 100%; display: flex; flex-direction: column; }
      .course-cover { width: 100%; height: 100px; object-fit: cover; display: block; background: var(--mdui-color-surface-container-high); }
      .course-body { padding: 12px; display: flex; flex-direction: column; flex-grow: 1; }
      .course-title { margin: 0; font-size: 14px; font-weight: 700; line-height: 1.3; height: 36px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .course-desc { margin: 6px 0 0 0; opacity: 0.7; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      .highlight { 
        color: var(--mdui-color-on-primary-container); 
        background-color: var(--mdui-color-primary-container); 
        border-radius: 4px; 
        padding: 0 2px;
        font-weight: bold;
      }

      .course-dialog::part(panel) { padding: 0; width: 100vw; height: 100vh; max-height: 100vh; border-radius: 0; }
      .course-doc-wrap { height: 100%; overflow-y: auto; background: var(--mdui-color-surface); scroll-behavior: smooth; }
      .course-hero { width: 100%; height: 220px; object-fit: cover; background: var(--mdui-color-surface-container-high); }
      .course-doc { padding: 24px; max-width: 800px; margin: 0 auto; }

      .markdown-body { line-height: 1.8; font-size: 16px; color: var(--mdui-color-on-surface); }
      .markdown-body h1 { font-size: 2.2rem; margin-bottom: 1.5rem; border-bottom: 3px solid var(--mdui-color-primary-container); padding-bottom: 10px; }
      .markdown-body h2 { font-size: 1.6rem; margin-top: 2rem; border-bottom: 1px solid var(--mdui-color-outline-variant); padding-bottom: 6px; }
      .markdown-body h3 { font-size: 1.3rem; margin-top: 1.5rem; color: var(--mdui-color-primary); }
      .markdown-body code { background: var(--mdui-color-secondary-container); color: var(--mdui-color-on-secondary-container); padding: 2px 6px; border-radius: 4px; font-family: 'Roboto Mono', monospace; font-size: 0.9em; }
      .markdown-body pre { background: #1e1e1e; color: #d4d4d4; padding: 18px; border-radius: 10px; overflow-x: auto; margin: 20px 0; }
      .markdown-body blockquote { border-left: 5px solid var(--mdui-color-primary); background: var(--mdui-color-surface-container-high); margin: 20px 0; padding: 12px 20px; border-radius: 0 8px 8px 0; }
      .markdown-body img { max-width: 100%; border-radius: 12px; margin: 16px 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: block; }
      
      .btn-link { margin-top: 16px; display: inline-block; }
      .favorites-sheet::part(panel) { border-radius: 20px 20px 0 0; }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="content">
        <div class="top-controls">
          <mdui-text-field id="searchInput" class="search-input" icon="search" clearable placeholder="搜索教程..." variant="outlined"></mdui-text-field>
          <mdui-button id="favoritesBtnDesktop" variant="tonal" icon="bookmarks">收藏夹</mdui-button>
        </div>
        <div class="grid" id="courseGrid"></div>
      </div>
    </div>

    <mdui-snackbar id="coursesSnackbar" closeable></mdui-snackbar>

    <mdui-dialog id="courseDialog" fullscreen class="course-dialog">
      <div class="course-doc-wrap">
        <img id="courseHeroImg" class="course-hero" src="" alt="封面" />
        <div id="courseDoc" class="course-doc markdown-body"></div>
      </div>
    </mdui-dialog>

    <mdui-dialog id="favoritesSheet" class="favorites-sheet">
      <div style="padding: 18px; display: flex; align-items: center; border-bottom: 1px solid var(--mdui-color-outline-variant);">
        <mdui-icon name="bookmarks" style="margin-right: 12px"></mdui-icon>
        <div style="font-weight: 700; font-size: 1.2rem; flex-grow: 1">我的收藏</div>
        <mdui-button-icon id="favoritesCloseBtn" icon="close"></mdui-button-icon>
      </div>
      <mdui-list id="favoritesList" style="padding: 12px"></mdui-list>
    </mdui-dialog>

<script src="js/markdown.js"></script>


<script src="js/markdown_read.js"></script>

    <script>
const courses = [
  {
    id: "stream-master",
    title: "[正在施工]Moonlight + Sunshine 低延迟串流全攻略",
    desc: "从服务端(被控端)环境搭建到客户端(控制端)密钥配对的详细流程。",
    icon: "cast",
    cover: "icons/ms_cl.png",
    // 这里只放路径，不放具体内容
    mdPath: "tutorials/stream-master.md" 
  },
  {
    id: "ms-start",
    title: "基岩版开发：快速入门指南",
    desc: "学习附加包 (Add-on) 的开发，访问微软官方创作者中心。",
    icon: "rocket_launch",
    cover: "icons/mcbedrock_dev.png",
    mdPath: "tutorials/ms-start.md"
  }
];


      const dom = {
        grid: document.getElementById("courseGrid"),
        snackbar: document.getElementById("coursesSnackbar"),
        favoritesSheet: document.getElementById("favoritesSheet"),
        favoritesList: document.getElementById("favoritesList"),
        favoritesCloseBtn: document.getElementById("favoritesCloseBtn"),
        favoritesBtnDesktop: document.getElementById("favoritesBtnDesktop"),
        searchInput: document.getElementById("searchInput"),
        dialog: document.getElementById("courseDialog"),
        heroImg: document.getElementById("courseHeroImg"),
        doc: document.getElementById("courseDoc"),
      };

      let activeId = null;
      let favorites = JSON.parse(localStorage.getItem("mc_dev_favs") || "[]");

      function showToast(text) {
        dom.snackbar.textContent = text;
        dom.snackbar.open = true;
      }

      function highlightText(text, query) {
        if (!query) return text;
        const regex = new RegExp(`(${query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
      }

      function renderGrid(filterText = "") {
        const query = filterText.trim().toLowerCase();
        const filtered = courses.filter(c => c.title.toLowerCase().includes(query) || c.desc.toLowerCase().includes(query));

        dom.grid.innerHTML = filtered.map(c => `
          <mdui-card clickable class="course-card" onclick="openCourse('${c.id}')">
            <img class="course-cover" src="${c.cover}" alt="${c.title}">
            <div class="course-body">
              <div class="course-title">${highlightText(c.title, query)}</div>
              <div class="course-desc">${highlightText(c.desc, query)}</div>
            </div>
          </mdui-card>
        `).join('');
      }

      dom.searchInput.addEventListener('input', (e) => renderGrid(e.target.value));


// 修改后的 openCourse
async function openCourse(id) {
  const course = courses.find(c => c.id === id);
  if (!course) return;
  
  activeId = id;
  dom.heroImg.src = course.cover;
  dom.dialog.open = true; // 先打开弹窗
  dom.doc.innerHTML = "<p>正在加载教程...</p>"; // 显示 loading 状态
  notifyTopbar();

  // 核心：异步加载并渲染
  const html = await loadAndRenderMarkdown(course.mdPath);
  dom.doc.innerHTML = html;
}

      function renderFavorites() {
        const favData = favorites.map(id => courses.find(c => c.id === id)).filter(Boolean);
        dom.favoritesList.innerHTML = favData.length 
          ? favData.map(c => `<mdui-list-item rounded headline="${c.title}" onclick="openFromFav('${c.id}')"><mdui-icon slot="icon" name="${c.icon}"></mdui-icon></mdui-list-item>`).join('')
          : `<mdui-list-item disabled>暂时没有收藏项目</mdui-list-item>`;
      }

      window.openFromFav = (id) => {
        dom.favoritesSheet.open = false;
        setTimeout(() => openCourse(id), 250);
      };

      function notifyTopbar() {
        const course = courses.find(c => c.id === activeId);
        if (!dom.dialog.open || !course) {
          window.parent?.postMessage({ type: "app:topbar", tab: "courses", title: "教程", actions: [{ id: "act:open_favs", icon: "bookmarks", text: "收藏夹" }] }, "*");
          return;
        }
        const isFav = favorites.includes(activeId);
        window.parent?.postMessage({
          type: "app:topbar", tab: "courses", title: course.title, icon: "close", actionId: "act:close_detail",
          actions: [
          { id: "act:close_detail", icon: "unfold_less", text: "收起详情" },
          { id: "act:toggle_fav", icon: isFav ? "bookmark" : "bookmark_border", text: isFav ? "取消收藏" : "收藏本篇" }
  
          
          ]
        }, "*");
      }

      window.addEventListener("message", (event) => {
        const data = event?.data;
        if (data?.id === "act:close_detail") dom.dialog.open = false;
        if (data?.id === "act:toggle_fav" && activeId) {
          const index = favorites.indexOf(activeId);
          if (index > -1) favorites.splice(index, 1);
          else favorites.push(activeId);
          localStorage.setItem("mc_dev_favs", JSON.stringify(favorites));
          showToast(index > -1 ? "已移出收藏" : "已加入收藏");
          notifyTopbar();
          renderFavorites();
        }
        if (data?.id === "act:open_favs") { renderFavorites(); dom.favoritesSheet.open = true; }
      });

      dom.favoritesBtnDesktop.onclick = () => { renderFavorites(); dom.favoritesSheet.open = true; };
      dom.favoritesCloseBtn.onclick = () => dom.favoritesSheet.open = false;
      dom.dialog.addEventListener("close", () => { activeId = null; notifyTopbar(); });

      renderGrid();
      notifyTopbar();
    </script>
  </body>
</html>
